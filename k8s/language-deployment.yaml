apiVersion: apps/v1
kind: Deployment
metadata:
  name: language-deployment
  labels:
    app: language-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: language-service
  template:
    metadata:
      labels:
        app: language-service
    spec:
      containers:
      - name: language-service
        image: dhl-language-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
---
apiVersion: v1
kind: Service
metadata:
  name: language-service
spec:
  selector:
    app: language-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP
